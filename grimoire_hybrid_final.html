
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

.section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

function getLastPlayed(id) {
  const entries = state.playLog.filter(l=>l.gameId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return entries.length ? entries[0] : null;
}
function avgRating(id) {
  const all = state.playLog.filter(l=>l.gameId===id).flatMap(l=>l.players.map(p=>p.rating));
  if(!all.length) return null;
  return (all.reduce((a,b)=>a+b,0)/all.length).toFixed(1);
}

function renderGames() {
  const search = (document.getElementById('search-input')||{value:''}).value.toLowerCase();
  const typeF = (document.getElementById('filter-type')||{value:''}).value;
  let games = state.games.filter(g => g.name.toLowerCase().includes(search) && (!typeF || g.type===typeF));
  const grid = document.getElementById('games-grid');
  if(!grid) return;
  if(!games.length) { grid.innerHTML='<div class="empty-state">no games found in your grimoire</div>'; return; }

  grid.innerHTML = games.map((g, idx) => {
    const lp = getLastPlayed(g.id);
    const rating = avgRating(g.id);
    const stars = rating
      ? Array.from({length:5},(_,i)=>`<span class="star${i<Math.round(rating)?' on':''}"">★</span>`).join('')
      : '';
    const lastTxt = g.newGame ? 'fresh out the box' : lp ? `last played ${lp.date.slice(0,7)}` : 'dust gathering...';
    const neverBadge = (!lp && !g.newGame) ? `<div class="never-badge">never played</div>` : '';

    return `<div class="game-card" onclick="openGameDetail(${g.id})">
      ${g.newGame ? '<div class="new-badge">New</div>' : ''}
      <div class="card-header-strip">
        <span class="card-num">${ROMAN[idx] || (idx+1)}</span>
        <span class="card-type-icon">${TYPE_ICONS[g.type]||'🎲'}</span>
      </div>
      <div class="card-art">
        <span class="card-emoji">${g.emoji}</span>
        <div class="art-rule"></div>
      </div>
      <div class="card-body">
        <div class="card-name">${g.name}</div>
        <div class="card-type-label tag tag-${g.type}">${g.type}</div>
        ${neverBadge}
        <div class="card-meta-row">
          <span class="meta-chip">👥 ${g.minPlayers}–${g.maxPlayers}</span>
          <span class="meta-chip">⏱ ~${g.timeEst}m</span>
        </div>
        <div class="card-footer-inner">
          <span class="last-played-txt">${lastTxt}</span>
          <div class="star-row">${stars}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function runSuggestion() {
  const players = parseInt(document.getElementById('filt-players').value);
  const time = parseInt(document.getElementById('filt-time').value);
  const genre = document.getElementById('filt-genre').value;
  const lib = document.getElementById('filt-library').value;
  let pool = lib==='mine' ? state.games.filter(g=>g.owner==='Lyra') : state.games;
  pool = pool.filter(g => players>=g.minPlayers && players<=g.maxPlayers && g.timeEst<=time && (!genre||g.type===genre));
  pool = pool.map(g => {
    const lp = getLastPlayed(g.id);
    const daysSince = lp ? (Date.now()-new Date(lp.date))/(1000*86400) : 9999;
    const avgR = avgRating(g.id);
    let score = 50;
    if(daysSince>90) score+=20; else if(daysSince>30) score+=10;
    if(g.newGame) score+=25;
    if(avgR&&avgR>=4) score+=15;
    if(!lp) score+=15;
    return {...g,score,daysSince,avgR,lp};
  }).sort((a,b)=>b.score-a.score).slice(0,4);

  const out = document.getElementById('suggestions-out');
  if(!pool.length) { out.innerHTML='<div class="empty-state">no games match — try loosening the filters</div>'; return; }

  out.innerHTML = `<div class="suggestions-label">suggested for tonight</div>` +
    pool.map((g,i) => {
      const reasons = [];
      if(g.newGame) reasons.push('✨ brand new');
      else if(!g.lp) reasons.push('🕸️ never played');
      else if(g.daysSince>90) reasons.push(`last played ${Math.round(g.daysSince)}d ago`);
      else reasons.push(`last played ${g.lp.date.slice(0,7)}`);
      if(g.avgR) reasons.push(`avg ★ ${g.avgR}`);
      return `<div class="suggestion-card">
        <div class="sug-rank">${ROMAN[i]}</div>
        <div class="sug-emoji">${g.emoji}</div>
        <div class="sug-info">
          <div class="sug-name">${g.name} ${g.newGame?'<span style="font-size:10px;background:rgba(255,126,199,0.12);border:1px solid rgba(255,126,199,0.3);color:var(--g-pink);padding:1px 7px;border-radius:20px;font-family:Crimson Text,serif;font-style:italic;">new</span>':''}</div>
          <div class="sug-why">${reasons.join(' · ')} · ${g.minPlayers}–${g.maxPlayers}p · ~${g.timeEst}m</div>
        </div>
        <div class="sug-score"><span class="sug-score-num">${g.score}</span><span class="sug-score-lbl">match</span></div>
      </div>`;
    }).join('');
}

function renderLog() {
  const list = document.getElementById('log-list');
  if(!list) return;
  const sorted = [...state.playLog].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length) { list.innerHTML='<div class="empty-state">no sessions logged yet</div>'; return; }
  const ratingEmoji = r => r>=5?'😍':r>=4?'😊':r>=3?'😐':'😕';
  list.innerHTML = sorted.map(entry => {
    const pills = entry.players.map(p=>`<span class="player-pill">${p.name} ${ratingEmoji(p.rating)}</span>`).join('');
    return `<div class="log-entry">
      <div class="log-header"><div class="log-game">${entry.gameName}</div><div class="log-date">${entry.date}</div></div>
      <div class="log-players">${pills}</div>
      ${entry.notes?`<div class="log-note">"${entry.notes}"</div>`:''}
    </div>`;
  }).join('');
}

function renderNights() {
  const list = document.getElementById('nights-list');
  if(!list) return;
  if(!state.nights.length) { list.innerHTML='<div class="empty-state">no nights planned yet</div>'; return; }
  list.innerHTML = state.nights.map(n=>`<div class="night-card">
    <div class="night-name">${n.name}</div>
    <div class="night-meta">${n.date} · ${n.venue}</div>
    <div class="attendee-chips">${n.attendees.map(a=>`<span class="attendee-chip">${a}</span>`).join('')}</div>
    ${n.calendarSent?`<div class="invite-row">✓ calendar invites sent</div>`:''}
  </div>`).join('');
}

function renderUsers() {
  const list = document.getElementById('users-list');
  if(!list) return;
  list.innerHTML = state.users.map(u => {
    const sessions = state.playLog.filter(l=>l.players.some(p=>p.name===u.name)).length;
    const ownedChips = state.games.filter(g=>u.games.includes(g.id)).map(g=>`<span class="meta-chip">${g.emoji} ${g.name}</span>`).join('');
    return `<div class="user-card">
      <div class="user-avatar-lg" style="background:${u.color}18;color:${u.color};">${u.emoji}</div>
      <div style="flex:1;">
        <div class="user-name">${u.name}</div>
        <div class="user-stats">${u.games.length} games · ${sessions} sessions</div>
        <div class="user-game-chips">${ownedChips}</div>
      </div>
    </div>`;
  }).join('');
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='library') renderGames();
  if(name==='log') renderLog();
  if(name==='users') renderUsers();
  if(name==='nights') renderNights();
  if(name==='find') document.getElementById('suggestions-out').innerHTML='';
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

function openGameDetail(id) {
  const g = state.games.find(x=>x.id===id);
  if(!g) return;
  const lp = getLastPlayed(id);
  const rating = avgRating(id);
  const sessions = state.playLog.filter(l=>l.gameId===id);
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div style="display:flex;gap:14px;align-items:center;margin-bottom:16px;">
      <span style="font-size:42px;">${g.emoji}</span>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:3px;">${g.name}</div>
        <div style="font-size:13px;font-style:italic;color:var(--g-muted);">${g.type} · ${g.minPlayers}–${g.maxPlayers} players · ~${g.timeEst}m</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:var(--g-surface2);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--g-purple);">${sessions.length}</div>
        <div style="font-size:11px;font-style:italic;color:var(--g-muted);">sessions</div>
      </div>
      <div style="background:var(--g-surface2);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--g-amber);">${rating||'—'}</div>
        <div style="font-size:11px;font-style:italic;color:var(--g-muted);">avg rating</div>
      </div>
      <div style="background:var(--g-surface2);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:13px;font-weight:500;color:var(--g-teal);margin-top:4px;">${lp?lp.date.slice(0,7):'never'}</div>
        <div style="font-size:11px;font-style:italic;color:var(--g-muted);">last played</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">close</button>
      <button class="btn teal" onclick="closeModal();openLogPlay(${id})">+ log a session</button>
    </div>
  </div>
  </div>`;
}

function openAddGame() {
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">🎲 add a game</div>
    <div class="field"><span class="label">game name</span><input class="input" id="m-name" placeholder="e.g. Gloom" /></div>
    <div class="row2">
      <div class="field"><span class="label">type</span>
        <select class="input" id="m-type">${TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
      </div>
      <div class="field"><span class="label">emoji icon</span><input class="input" id="m-emoji" placeholder="🎲" style="font-size:18px;" /></div>
    </div>
    <div class="row2">
      <div class="field"><span class="label">min players</span><input class="input" id="m-min" type="number" min="1" max="10" value="2"/></div>
      <div class="field"><span class="label">max players</span><input class="input" id="m-max" type="number" min="1" max="20" value="4"/></div>
    </div>
    <div class="field"><span class="label">estimated time (minutes)</span><input class="input" id="m-time" type="number" value="60"/></div>
    <div class="field"><span class="label">date purchased</span><input class="input" id="m-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">cancel</button>
      <button class="btn" onclick="saveGame()" style="background:rgba(180,140,255,0.15);border-color:var(--g-purple);">add game</button>
    </div>
  </div>
  </div>`;
}

function saveGame() {
  const name = document.getElementById('m-name').value.trim();
  if(!name) return;
  state.games.push({
    id:state.nextId++,name,
    type:document.getElementById('m-type').value,
    emoji:document.getElementById('m-emoji').value||'🎲',
    minPlayers:parseInt(document.getElementById('m-min').value),
    maxPlayers:parseInt(document.getElementById('m-max').value),
    timeEst:parseInt(document.getElementById('m-time').value),
    bought:document.getElementById('m-date').value,
    owner:'Lyra',newGame:true,
  });
  closeModal(); renderGames();
}

function openLogPlay(preGameId) {
  const options = state.games.map(g=>`<option value="${g.id}" ${preGameId===g.id?'selected':''}>${g.emoji} ${g.name}</option>`).join('');
  const players = state.users.map(u=>`<label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:14px;"><input type="checkbox" id="lp-${u.id}" style="width:auto;" ${u.name==='Lyra'?'checked':''} />${u.emoji} ${u.name}</label>`).join('');
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">📖 log a session</div>
    <div class="field"><span class="label">game</span><select class="input" id="log-game">${options}</select></div>
    <div class="field"><span class="label">date</span><input class="input" id="log-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
    <div class="field"><span class="label">who played?</span>${players}</div>
    <div class="field"><span class="label">your rating</span>
      <div style="display:flex;gap:7px;margin-top:4px;">
        ${[1,2,3,4,5].map(n=>`<button onclick="setRating(${n})" id="rate-${n}" style="background:var(--g-surface2);border:1px solid var(--g-border);border-radius:6px;padding:6px 10px;color:var(--g-muted);cursor:pointer;font-size:14px;">${n}★</button>`).join('')}
      </div>
    </div>
    <div class="field"><span class="label">notes</span><input class="input" id="log-notes" placeholder="any memorable moments..." /></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">cancel</button>
      <button class="btn teal" onclick="saveLog()">save</button>
    </div>
  </div>
  </div>`;
  window._selectedRating = 4; setRating(4);
}

function setRating(n) {
  window._selectedRating = n;
  [1,2,3,4,5].forEach(i => {
    const b = document.getElementById('rate-'+i);
    if(b) b.style.color = i<=n ? 'var(--g-amber)' : 'var(--g-muted)';
  });
}

function saveLog() {
  const gameId = parseInt(document.getElementById('log-game').value);
  const game = state.games.find(g=>g.id===gameId);
  const players = state.users.filter(u=>document.getElementById('lp-'+u.id)?.checked).map(u=>({name:u.name,rating:window._selectedRating||3}));
  if(!players.length) return;
  state.playLog.push({id:state.nextId++,gameId,gameName:game.name,date:document.getElementById('log-date').value,players,notes:document.getElementById('log-notes').value});
  if(game.newGame) game.newGame = false;
  closeModal(); renderLog();
}

function openPlanNight() {
  const attendees = state.users.map(u=>`<span class="attendee-chip" id="att-${u.id}" onclick="toggleAtt(${u.id})" style="cursor:pointer;opacity:0.45;">${u.emoji} ${u.name}</span>`).join('');
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title">🌙 plan a game night</div>
    <div class="field"><span class="label">night name</span><input class="input" id="nn-name" placeholder="e.g. Friday Fright Night"/></div>
    <div class="row2">
      <div class="field"><span class="label">date</span><input class="input" id="nn-date" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="field"><span class="label">venue</span><input class="input" id="nn-venue" placeholder="your place"/></div>
    </div>
    <div class="field"><span class="label">who's coming? (tap to select)</span>
      <div class="attendee-chips" style="margin-top:8px;">${attendees}</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">cancel</button>
      <button class="btn" onclick="saveNight()" style="background:rgba(180,140,255,0.15);border-color:var(--g-purple);">plan it!</button>
    </div>
  </div>
  </div>`;
  window._selAtt = new Set(['Lyra']); updateAttChips();
}

function toggleAtt(uid) {
  const u = state.users.find(x=>x.id===uid);
  if(!u) return;
  if(window._selAtt.has(u.name)) window._selAtt.delete(u.name); else window._selAtt.add(u.name);
  updateAttChips();
}
function updateAttChips() {
  state.users.forEach(u => {
    const el = document.getElementById('att-'+u.id);
    if(el) el.style.opacity = window._selAtt.has(u.name) ? '1' : '0.4';
  });
}
function saveNight() {
  const name = document.getElementById('nn-name').value.trim()||'Game Night';
  state.nights.push({id:state.nextId++,name,date:document.getElementById('nn-date').value,venue:document.getElementById('nn-venue').value||'TBD',attendees:[...window._selAtt],calendarSent:true});
  closeModal(); renderNights();
}

renderGames();
</script>
